<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <title>Article Audio Skipper — nastavení</title>
    <style>
      body { font: 14px/1.5 system-ui; max-width: 560px; margin: 24px auto; padding: 0 16px; color: #222; }
      h1 { font-size: 18px; }
      .row { margin: 12px 0; }
      label { display: block; margin-bottom: 4px; font-weight: 600; }
      select { padding: 6px 8px; width: 100%; }
      .hint { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Article Audio Skipper</h1>
    <p class="hint">
      Rozšíření u TTS přehrávače Seznam rodiny webů (Novinky, SZ, Sport.cz, …) potichu přeskočí
      prerollové reklamy a pustí rovnou <strong>namluvený článek</strong>. Originální Seznam
      přehrávač zůstává jediným viditelným UI.
    </p>

    <div class="row">
      <label for="quality">Preferovaná kvalita MP3</label>
      <select id="quality">
        <option value="high">Vysoká (192 kbps)</option>
        <option value="medium">Střední (128 kbps)</option>
        <option value="low">Nízká (64 kbps)</option>
      </select>
      <div class="hint">Použije se fallback na nižší kvalitu, pokud preferovaná není dostupná.</div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
